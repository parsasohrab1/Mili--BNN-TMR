name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,ml]"

      - name: Ensure reference MNIST model
        run: |
          if [ ! -f data/mnist.mili ]; then
            mili-compile --reference mnist -o data/mnist.mili
          fi
          test -f data/mnist.mili

      - name: Build SDK tarball
        run: mili-release --build-sdk -o dist/

      - name: Upload SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mili-bnn-tmr-sdk
          path: dist/mili-bnn-tmr-sdk-*.tar.gz
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/mili-bnn-tmr-sdk-*.tar.gz
          generate_release_notes: true
